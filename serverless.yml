service: url-shortener
frameworkVersion: '3'
useDotenv: true

# ─── 1. Provider & Environment ──────────────────────────────────────────────
provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  region: ap-south-1
  timeout: 10
  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      exposedResponseHeaders:
        - X-Cache
      allowCredentials: false
      maxAge: 86400

  environment:
    DYNAMODB_TABLE:           ${self:service}-${sls:stage}
    ANALYTICS_QUEUE_URL:      !Ref AnalyticsQueue
    URL_SAFETY_QUEUE_URL:     !Ref UrlSafetyQueue
    SAFE_BROWSING_API_KEY:    ${env:SAFE_BROWSING_API_KEY}
    UPSTASH_REDIS_REST_URL:   ${env:UPSTASH_REDIS_REST_URL}
    UPSTASH_REDIS_REST_TOKEN: ${env:UPSTASH_REDIS_REST_TOKEN}
    IP_HASH_SALT:             ${env:IP_HASH_SALT}
    # Clerk authentication keys
    CLERK_PUBLISHABLE_KEY:    ${env:CLERK_PUBLISHABLE_KEY}
    CLERK_SECRET_KEY:         ${env:CLERK_SECRET_KEY}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource:
            - !GetAtt UrlTable.Arn
            # Allow Query on GSI2-UserLinks for dashboard endpoints
            - !Join
              - ""
              - - !GetAtt UrlTable.Arn
                - "/index/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - !GetAtt AnalyticsQueue.Arn
            - !GetAtt UrlSafetyQueue.Arn

# ─── 3. Lambda Functions & API Routes ───────────────────────────────────────
functions:
  shorten:
    handler: src/handlers/shorten.handler
    memorySize: 256
    events:
      - httpApi:
          path: /shorten
          method: post

  redirect:
    handler: src/handlers/redirect.handler
    memorySize: 512
    events:
      - httpApi:
          path: /{id}
          method: get

  stats:
    handler: src/handlers/stats.handler
    memorySize: 256
    events:
      - httpApi:
          path: /stats/{id}
          method: get

  cacheStatus:
    handler: src/handlers/cache-status.handler
    memorySize: 256
    events:
      - httpApi:
          path: /cache-status/{id}
          method: get

  # ── Dashboard API (Premium users only) ─────────────────────────────────────
  manageGetLinks:
    handler: src/handlers/manage.handler
    memorySize: 256
    events:
      - httpApi:
          path: /user/links
          method: get

  manageUpdateLink:
    handler: src/handlers/manage.handler
    memorySize: 256
    events:
      - httpApi:
          path: /user/links/{id}
          method: put

  manageGetLinkStats:
    handler: src/handlers/manage.handler
    memorySize: 512
    timeout: 15
    events:
      - httpApi:
          path: /user/links/{id}/stats
          method: get

  analyticsWorker:
    handler: src/handlers/analytics-worker.handler
    memorySize: 256
    events:
      - sqs:
          arn: !GetAtt AnalyticsQueue.Arn
          batchSize: 10
          maximumBatchingWindow: 5
          functionResponseType: ReportBatchItemFailures

  urlSafetyWorker:
    handler: src/handlers/url-safety-worker.handler
    memorySize: 256
    timeout: 29
    events:
      - sqs:
          arn: !GetAtt UrlSafetyQueue.Arn
          batchSize: 10
          functionResponseType: ReportBatchItemFailures

# ─── 4. Cloud Infrastructure ─────────────────────────────────────────────────
resources:
  Resources:
    UrlTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          # GSI2-UserLinks: partition by userId, sort by createdAt
          - AttributeName: userId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: N
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI2-UserLinks
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: INCLUDE
              NonKeyAttributes:
                - id
                - originalUrl
                - clickCount
                - isActive
                - tier
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    AnalyticsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-analytics-${sls:stage}
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt AnalyticsQueueDLQ.Arn
          maxReceiveCount: 3

    AnalyticsQueueDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-analytics-dlq-${sls:stage}
        MessageRetentionPeriod: 1209600

    UrlSafetyQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-url-safety-${sls:stage}
        VisibilityTimeout: 180
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt UrlSafetyQueueDLQ.Arn
          maxReceiveCount: 3

    UrlSafetyQueueDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-url-safety-dlq-${sls:stage}
        MessageRetentionPeriod: 1209600
